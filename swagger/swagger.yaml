openapi: 3.0.0
info:
  title: Event Booking API
  version: 1.0.0
  description: Mini Event Management System

servers:
  - url: https://event-booking-api-ls90.onrender.com/api
  - url: http://localhost:5000/api

paths:
  /events:
    get:
      summary: Get all events
      responses:
        200:
          description: Events fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'

    post:
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - date
                - capacity
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                capacity:
                  type: integer
      responses:
        201:
          description: Event created successfully

  /bookings:
    post:
      summary: Book ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - event_id
              properties:
                user_id:
                  type: integer
                event_id:
                  type: integer
      responses:
        201:
          description: Booking successful

  /users/{id}/bookings:
    get:
      summary: Get user bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User bookings fetched

  /events/{id}/attendance:
    post:
      summary: Mark attendance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        200:
          description: Attendance marked

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
        total_capacity:
          type: integer
        remaining_tickets:
          type: integer